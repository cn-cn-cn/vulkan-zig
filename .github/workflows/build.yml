name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

    - name: Check formatting
      run: zig fmt --check .

    - name: Install OpenXR Loader
      run: |
        sudo apt update
        sudo apt install libopenxr-dev libopenxr-loader1 openxr-layer-corevalidation

    # - name: Fetch latest xr.xml
    #   run: |
    #     wget https://raw.githubusercontent.com/KhronosGroup/OpenXR-SDK/refs/heads/main/specification/registry/xr.xml

    - name: Install generator
      run: zig build

    - name: Generate xr.zig
      run: zig-out/bin/openxr-zig-generator examples-openxr/xr.xml xr.zig

    - name: Sanity-check xr.zig
      run: zig build-obj xr.zig

    - name: Build example
      run: zig build
      working-directory: ./examples-openxr

    - name: Test and install with latest zig & latest vk.xml
      run: zig build test install -Dregistry=$(pwd)/examples-openxr/xr.xml

    # - name: Test and install with latest zig & latest vk.xml & latest video.xml
    #   run: zig build test install -p zig-out-video -Dregistry=$(pwd)/vk.xml -Dvideo=$(pwd)/video.xml

    # - name: Build example with latest zig & vk.xml from dependency
    #   run: zig build --build-file $(pwd)/examples/build.zig

    # - name: Build example with latest zig & latest vk.xml
    #   run: zig build --build-file $(pwd)/examples/build.zig -Doverride-registry=$(pwd)/vk.xml

    # # - name: Build example with latest zig & vk.xml from dependency & use zig shaders
    # #   run: zig build --build-file $(pwd)/examples/build.zig -Dzig-shader

